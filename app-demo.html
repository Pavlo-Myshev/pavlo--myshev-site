<!doctype html><html lang="uk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PM Асистент — прототип</title><link rel="stylesheet" href="assets/style.css"><style>body{display:grid;place-items:center;min-height:100vh;padding:24px}.phone{width:min(380px,100%);background:#000;border:12px solid #222;border-radius:42px;padding:18px;min-height:680px}.top{text-align:center}.top img{width:70px;height:70px;border-radius:50%}.screen{display:none}.screen.active{display:block}.mic{width:150px;height:150px;border-radius:50%;margin:30px auto;display:grid;place-items:center;background:radial-gradient(circle,#d6a33a,#7a5200);font-size:56px;cursor:pointer}.ag{display:grid;grid-template-columns:1fr 1fr;gap:12px}.tile{background:#141414;border:1px solid #d6a33a44;border-radius:16px;padding:18px;text-align:center;cursor:pointer}.back{color:var(--l);cursor:pointer}.status{text-align:center;color:var(--l)}</style></head><body><div class="phone"><div class="top"><img src="assets/pm-logo.jpg"><h2>PM Асистент</h2></div><div id="home" class="screen active"><p style="text-align:center">Скажіть, що потрібно зробити</p><div class="mic" onclick="voice()">🎙️</div><div class="status" id="s">Натисніть на мікрофон</div><div class="ag"><div class="tile" onclick="show('calls')">📞 Дзвінки</div><div class="tile" onclick="show('tr')">🌍 Переклад</div><div class="tile" onclick="show('docs')">📄 Документи</div><div class="tile" onclick="show('help')">🚨 Допомога</div></div></div><div id="calls" class="screen"><span class="back" onclick="show('home')">← Назад</span><h2>Дзвінки</h2><div class="tile">Мама</div><div class="tile">Лікар</div></div><div id="tr" class="screen"><span class="back" onclick="show('home')">← Назад</span><h2>Переклад</h2><div class="tile">Німецька → Українська</div></div><div id="docs" class="screen"><span class="back" onclick="show('home')">← Назад</span><h2>Документи</h2><div class="tile">Сканувати</div><div class="tile">Прочитати</div></div><div id="help" class="screen"><span class="back" onclick="show('home')">← Назад</span><h2>Допомога</h2><div class="tile">Швидка</div><div class="tile">Поліція</div></div></div><script>function show(id){document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));document.getElementById(id).classList.add("active")}function voice(){const s=document.getElementById("s"),R=window.SpeechRecognition||window.webkitSpeechRecognition;if(!R){s.textContent="Відкрийте в Google Chrome — голосове розпізнавання не підтримується.";return}const r=new R();r.lang="uk-UA";s.textContent="Слухаю...";r.onresult=e=>s.textContent="Ви сказали: "+e.results[0][0].transcript;r.onerror=e=>s.textContent="Помилка: "+e.error;r.start()}</script></body></html>
